<!DOCTYPE html>
<html>
  <head>
      <!-- Tab Bar Visible Name -->
    <title>D20 Games</title>
      <!-- Emoji Text Enabler -->
    <meta charset="UTF-8"> <p hidden>/* Code for Emoji */</p>
      <!-- Link for .html to read Styles from .css -->
    <link rel="stylesheet" href="menu buttons.css">
  </head>

  <body>

    <!-- Floating Background (Everything is grouped by <div) -->
    <div style="
      width: 80%; 
      max-width: 814px; 
      margin: 0 auto;
      border-radius: 32px; 
      border: 1px solid rgba(180, 180, 180, 0.201); 
      background: transparent; 
      backdrop-filter: blur(80px);
      padding: 32px; 
      box-shadow: rgba(15, 23, 42, 0.35) 0px 30px 60px;">

      <!-- D20 Games Welcome Bar -->
      <button class="d20games-button"> 
        <h1 style="font-size: 3rem; margin: 0px; line-height: 1.05;">🎲 D20 Games</h1>
        <p style="margin-top: 16px; color: rgb(203, 213, 225); font-size: 1.05rem;">
          Welcome to the App. Use the buttons below to open dedicated pages for each section.</p>
      </button>

      <!-- Grid for Buttons (Grouped by <div) -->
      <div
        style="display: grid;
        gap: 10px;
        margin-top: 28px;
        grid-template-columns: repeat(auto-fit, minmax(265px, 1fr));">


      <!-- Dashboard Button -->
      <button class="dashboard-button">
        <h1 style="font-size: 2rem; margin: 0px; line-height: 1.05;">Dashboard</h1>
        <p style="margin-top: 16px; color: rgb(203, 213, 225); font-size: .8rem;">View current game.</p>
      </button>

      <!-- Events Button -->
      <button class="events-button">
        <h1 style="font-size: 2rem; margin: 0px; line-height: 1.05;">Events</h1>
        <p style="margin-top: 16px; color: rgb(203, 213, 225); font-size: .8rem;">View all Events.</p>  
      </button>


      <!-- Stats Button -->
      <button class="stats-button">
        <h1 style="font-size: 2rem; margin: 0px; line-height: 1.05;">Stats</h1>
        <p style="margin-top: 16px; color: rgb(203, 213, 225); font-size: .8rem;">View your statistics.</p>
      </button>

      <!-- Friends Button -->
      <button class="friends-button">
        <h1 style="font-size: 2rem; margin: 0px; line-height: 1.05;">Friends</h1>
        <p style="margin-top: 16px; color: rgb(203, 213, 225); font-size: .8rem;">View your friends.</p>
      </button>
      </div>
      </div>

  </body>
</html>
